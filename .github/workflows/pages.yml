# 工作流名称
name: Deploy to GitHub Pages

# 触发条件：推送到 main 分支
on:
  push:
    branches: [ main ]

# 执行任务
jobs:
  deploy:
    runs-on: ubuntu-latest  # 运行环境
    steps:
      # 步骤1：拉取仓库代码
      - name: Checkout code
        uses: actions/checkout@v4

      # 步骤2：构建项目
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20  # 适配你的项目Node版本
          cache: 'npm'      # 启用npm缓存提高构建速度

      - name: Install dependencies
        run: |
          npm config set registry https://registry.npmjs.org/
          # 如果 package-lock.json 包含私有仓库地址，可能导致安装失败，建议用户在本地重新生成
          # 这里强制使用 npm install 尝试修复，如果仍然失败，请在本地删除 package-lock.json 后重新 npm install 并提交
          npm install --force

      - name: Build project
        run: npm run build  # 打包命令，生成public目录

      # 步骤3：部署到GitHub Pages
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4  # 成熟的部署插件
        with:
          # GitHub自动生成的密钥，无需手动配置
          github_token: ${{ secrets.GITHUB_TOKEN }}
          # 要部署的文件目录（纯静态页填./，Vue/React填./dist，Hexo填./public）
          publish_dir: ./public
          # 部署到gh-pages分支（GitHub Pages默认读取该分支）
          publish_branch: gh-pages