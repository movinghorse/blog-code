      <div class="post-excerpt">其实这本书早就看完了，当时摘录了一些文字，不敢独藏，唯有共享。孟孟瞪大眼睛，看着我，说，你知道么，如果当时这段视频能发出去，也许我早就红了。我看着她笑了。
“虚惊一场”这四个字是人世间最好的成语。
她以前还和外校生谈过一次恋爱，但后来人家甩了她，所以她就有防备，说不能让我太容易的</div>
